name: ignite3

services:
  node1:
    image: apacheignite/ignite:3.1.0
    platform: linux/amd64
    command: --node-name node1
    environment:
      JVM_MAX_MEM: "2g"
      JVM_MIN_MEM: "1g"
    ports:
      - "10300:10300" # REST API
      - "10800:10800" # Thin Client
    configs:
      - source: node_config
        target: /opt/ignite/etc/ignite-config.conf
        mode: 0644

configs:
  node_config:
    content: |
      ignite {
        network {
          port: 3344
          nodeFinder.netClusterNodes = ["node1:3344"]
        }
      }